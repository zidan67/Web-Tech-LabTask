<!DOCTYPE html>
<html>
<head>
<style>

body {
  margin: 0;
}

/* Sticky Navbar */
.navbar {
  position: sticky;
  top: 0;
  background: black;
  color: white;
  padding: 15px;
}

/* Container */
.container {
  position: relative;
  height: 400px;
  background: lightgray;
  margin: 20px;
}

/* Absolute Badge */
.badge {
  position: absolute;
  top: 10px;
  right: 10px;
  background: red;
  color: white;
  padding: 5px;
}

/* Fixed Chat Button */
.chat {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: green;
  color: white;
  padding: 10px;
  border-radius: 50%;
}

/* Normal Box */
.box {
  background: skyblue;
  padding: 20px;
  margin: 20px;
}

</style>
</head>
<body>

<div class="navbar">Sticky Navbar</div>

<div class="container">
  <div class="badge">New</div>
  <div class="box">Normal Content</div>
</div>

<div class="chat">Chat</div>

</body>
</html>
